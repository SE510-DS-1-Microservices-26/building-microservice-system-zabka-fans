apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: internship-tracker
data:
  ReverseProxy__Clusters__core__Destinations__default__Address: "http://core-service:8080"
  ReverseProxy__Clusters__users__Destinations__default__Address: "http://user-service:8080"
  ReverseProxy__Clusters__it-provision__Destinations__default__Address: "http://it-provision-service:8080"
  ReverseProxy__Clusters__notification__Destinations__default__Address: "http://notification-service:8080"
  ReverseProxy__Clusters__rabbitmq__Destinations__default__Address: "http://rabbitmq:15672"
  ReverseProxy__Clusters__jaeger__Destinations__default__Address: "http://jaeger:16686"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: internship-tracker
  labels:
    app: gateway-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          image: internship-tracker/gateway-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: gateway-config
          env:
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: ASPNETCORE_ENVIRONMENT
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /core/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /core/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: internship-tracker
spec:
  selector:
    app: gateway-service
  ports:
    - port: 80
      targetPort: 8080